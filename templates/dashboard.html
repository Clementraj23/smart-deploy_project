<!DOCTYPE html>
<html>
<head>
    <title>SmartDeploy AI</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            font-family: "Poppins", sans-serif;
            text-align: center;
            padding: 40px;
        }

        input {
            padding: 10px;
            width: 300px;
            border-radius: 10px;
            border: none;
        }

        button {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: #7f5af0;
            color: white;
            cursor: pointer;
        }

        .card {
            margin-top: 30px;
            padding: 20px;
            background: #1a1a2e;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<h1>🚀 SmartDeploy AI</h1>

<input id="repoInput" placeholder="Enter GitHub Repo URL">
<button onclick="deploy()">Deploy</button>

<div class="card">
    <h2>📦 Deployments</h2>
    <div id="deployments"></div>
</div>

<script src="/static/dashboard.js"></script>

</body>
</html>
