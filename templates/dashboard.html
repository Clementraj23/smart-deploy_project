<!DOCTYPE html>
<html>
<head>
    <title>SmartDeploy AI</title>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <style>
        body {
            background: #1e1e2f;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        input {
            padding: 10px;
            width: 300px;
        }

        button {
            padding: 10px;
            background: purple;
            color: white;
            border: none;
        }

        .card {
            background: #2c2c4a;
            margin: 20px;
            padding: 15px;
            border-radius: 10px;
        }

        pre {
            text-align: left;
            background: black;
            padding: 10px;
            height: 200px;
            overflow: auto;
        }
    </style>
</head>

<body>

<h1>🚀 SmartDeploy AI</h1>

<input id="repo" placeholder="GitHub Repo URL">
<button onclick="deployRepo()">Deploy</button>

<h3 id="cpu">CPU: Loading...</h3>

<h2>📦 Deployments</h2>
<div id="deployments"></div>

<h2>📜 Logs</h2>
<pre id="logs"></pre>

<script src="/static/dashboard.js"></script>

</body>
</html>
