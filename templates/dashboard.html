<!DOCTYPE html>
<html>
<head>
    <title>SmartDeploy AI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>🚀 SmartDeploy AI</h1>

<div class="card">
    <input id="repo" placeholder="GitHub Repo URL"/>
    <button onclick="deploy()">Deploy</button>
</div>

<div class="grid">

    <div class="card">
        <h2>📦 Deployments</h2>
        <div id="deployments"></div>
    </div>

    <div class="card">
        <h2>📜 Logs</h2>
        <pre id="logs"></pre>
    </div>

</div>

<div class="grid">

    <div class="card">
        <h2>🚨 Alerts</h2>
        <div id="alerts"></div>
    </div>

    <div class="card">
        <h2>📊 CPU Usage (Live)</h2>
        <canvas id="cpuChart"></canvas>
    </div>

</div>

<!-- SOCKET -->
<script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>

<!-- CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="/static/dashboard.js"></script>

</body>
</html>
